<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:svgjs="http://svgjs.dev/svgjs" viewBox="0 0 700 700" width="700" height="700">
<defs>
<filter id="nnnoise-filter" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="linearRGB">
	<feTurbulence type="turbulence" baseFrequency="0.15" numOctaves="3" result="turbulence" seed="2"/>
    <feColorMatrix in="turbulence" type="saturate" values="0"/>
    <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0.05 0.05 0.1 0.1 0.05 0.05 0"/>
    </feComponentTransfer>
    <feGaussianBlur stdDeviation="0.3"/>
</filter>
</defs>
<rect width="700" height="700" fill="transparent" style="--darkreader-inline-fill: transparent;" data-darkreader-inline-fill="">
</rect>
<rect width="700" height="700" fill="white" filter="url(#nnnoise-filter)" opacity="0.2" style="--darkreader-inline-fill: #614686;" data-darkreader-inline-fill="">
</rect>
</svg>